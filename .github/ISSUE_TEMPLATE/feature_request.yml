name: Feature request / Solicitar recurso
description: Suggest an improvement or new feature / Sugerir melhoria ou nova funcionalidade para o plugin
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. More context helps prioritization.

        Obrigado pela sugestão. Quanto mais contexto, melhor para priorização.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve / Problema que você quer resolver
      description: What current pain exists? / Qual dor atual existe?
      placeholder: "Example / Ex.: I need automatic reconnect after the tunnel drops."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / Proposta de solução
      description: How should it work? / Como você imagina que deveria funcionar?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / Alternativas consideradas
      description: Is there a current workaround? Other ideas? / Há workaround atual? Outras ideias?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority / Prioridade sugerida
      options:
        - P1 (high / alto)
        - P2 (medium / médio)
        - P3 (low / baixo)
    validations:
      required: false
